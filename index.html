<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maze Runner 🦞</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            overflow: hidden;
            touch-action: none;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
        }

        .info {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 15px;
            text-align: center;
        }

        #game-container {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.3);
        }

        #maze {
            display: block;
            border-radius: 8px;
        }

        #ball {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff, #4ade80);
            box-shadow: 0 0 10px rgba(74, 222, 128, 0.8), inset -2px -2px 4px rgba(0,0,0,0.3);
            pointer-events: none;
            transition: transform 0.05s linear;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(99, 102, 241, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .stats {
            margin-top: 15px;
            display: flex;
            gap: 30px;
            font-size: 1.1rem;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 8px;
        }

        .stat-value {
            color: #4ade80;
            font-weight: bold;
        }

        .stats-row {
            display: flex;
            gap: 30px;
            margin-bottom: 15px;
        }

        .high-scores {
            display: flex;
            gap: 20px;
            font-size: 0.9rem;
        }

        .high-score {
            background: rgba(255, 255, 255, 0.08);
            padding: 8px 16px;
            border-radius: 8px;
        }

        .high-score span {
            color: #aaa;
        }

        .high-score b {
            color: #4ade80;
        }

        #permission-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            text-align: center;
            padding: 20px;
        }

        #permission-overlay.hidden {
            display: none;
        }

        #permission-overlay h2 {
            font-size: 1.5rem;
            margin-bottom: 15px;
        }

        #permission-overlay p {
            color: #aaa;
            margin-bottom: 20px;
        }

        .difficulty {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .difficulty select {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            background: #333;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }

        #keyboard-hint {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #666;
        }

        .debug-toggle {
            margin-top: 10px;
        }

        .debug-toggle label {
            font-size: 0.85rem;
            color: #aaa;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .debug-toggle input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .celebration {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .celebration.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="permission-overlay">
        <div>
            <h2>🎮 Maze Runner</h2>
            <p>Tilt your phone to roll the ball through the maze!<br><br>
            Or use arrow keys / WASD on desktop.</p>
            <button id="start-btn">Start Game</button>
        </div>
    </div>

    <h1>🦞 Maze Runner</h1>
    <div class="info">Tilt your phone to move • Reach the green zone!</div>

    <div class="difficulty">
        <select id="difficulty">
            <option value="easy">Easy (10x10)</option>
            <option value="medium" selected>Medium (15x15)</option>
            <option value="hard">Hard (20x20)</option>
            <option value="extreme">Extreme (30x30)</option>
        </select>
    </div>

    <div id="game-container">
        <canvas id="maze"></canvas>
        <div id="ball"></div>
    </div>

    <div class="stats-row">
        <div class="stat">Time: <span id="time" class="stat-value">0.0s</span></div>
        <div id="timer-warning" class="stat" style="display:none; background: rgba(239, 68, 68, 0.3); color: #fca5a5;"></div>
    </div>

    <div class="high-scores">
        <div class="high-score"><span>Easy:</span> <b id="best-easy">—</b></div>
        <div class="high-score"><span>Medium:</span> <b id="best-medium">—</b></div>
        <div class="high-score"><span>Hard:</span> <b id="best-hard">—</b></div>
        <div class="high-score"><span>Extreme:</span> <b id="best-extreme">—</b></div>
    </div>

    <div class="controls">
        <button id="new-maze-btn">🔄 New Maze</button>
    </div>

    <div class="debug-toggle">
        <label>
            <input type="checkbox" id="toggle-debug"> 
            Show cell boundaries & debug info
        </label>
    </div>

    <div id="keyboard-hint">Desktop: Use Arrow keys or WASD</div>
    <div id="debug-info" style="display:none; margin-top: 10px; font-size: 0.75rem; color: #666;"></div>

    <script>
        // Game Configuration
        const CONFIG = {
            easy: { cols: 10, rows: 10, cellSize: 40 },
            medium: { cols: 15, rows: 15, cellSize: 30 },
            hard: { cols: 20, rows: 20, cellSize: 25 },
            extreme: { cols: 30, rows: 30, cellSize: 20 }
        };

        // Physics constants (realistic ball physics)
        const GRAVITY_ACCEL = 0.012;      // Acceleration due to tilt (increased for better responsiveness)
        const SURFACE_FRICTION_BASE = 0.985;   // Rolling friction (higher = less friction)
        const BALL_BOUNCE_BASE = 0.6;          // Energy retained on wall bounce (increased for more responsive feel)
        const VELOCITY_THRESHOLD = 0.001; // Stop if below this speed
        const MAX_VELOCITY = 0.5;         // Cap ball speed
        const ballRadius = 8;

        // Difficulty-based physics modifiers
        const PHYSICS_MODIFIERS = {
            easy:   { friction: 1.0, bounce: 1.0 },  // Most forgiving
            medium: { friction: 0.985, bounce: 1.0 }, // Default
            hard:   { friction: 0.982, bounce: 0.95 }, // Slightly more friction/slower bounces
            extreme:{ friction: 0.98, bounce: 0.9 }   // Hardest
        };

        // Game State
        let maze = [];
        let ball = { x: 0, y: 0, vx: 0, vy: 0 };
        let goal = { x: 0, y: 0 };
        let config = CONFIG.medium;
        let cellSize = 30;
        let isPlaying = false;
        let startTime = 0;
        
        // Time limits per difficulty (in seconds)
        const TIME_LIMITS = {
            easy: 60,
            medium: 120,
            hard: 180,
            extreme: 360
        };

        // DOM Elements
        const canvas = document.getElementById('maze');
        const ctx = canvas.getContext('2d');
        const ballEl = document.getElementById('ball');
        const timeEl = document.getElementById('time');
        const overlay = document.getElementById('permission-overlay');
        const timerWarningEl = document.getElementById('timer-warning');
        
        // High score display elements
        const bestElements = {
            easy: document.getElementById('best-easy'),
            medium: document.getElementById('best-medium'),
            hard: document.getElementById('best-hard'),
            extreme: document.getElementById('best-extreme')
        };

        // Load high scores on init
        function loadHighScores() {
            const highScores = JSON.parse(localStorage.getItem('mazeHighScores') || '[]');
            
            // Find best time per difficulty
            const bestTimes = { easy: null, medium: null, hard: null, extreme: null };
            
            highScores.forEach(entry => {
                const diff = entry.difficulty;
                if (bestTimes[diff] === null || entry.time < bestTimes[diff]) {
                    bestTimes[diff] = entry.time;
                }
            });
            
            // Update display
            for (const [diff, time] of Object.entries(bestTimes)) {
                if (bestElements[diff]) {
                    bestElements[diff].textContent = time ? `${time.toFixed(1)}s` : '—';
                }
            }
        }

        // Save high score if new best
        function saveHighScore(difficulty, time) {
            const highScores = JSON.parse(localStorage.getItem('mazeHighScores') || '[]');
            
            // Check if this is a new best time
            const currentBest = highScores
                .filter(entry => entry.difficulty === difficulty)
                .sort((a, b) => a.time - b.time)[0]?.time;
            
            if (currentBest === undefined || time < currentBest) {
                highScores.push({
                    date: new Date().toISOString(),
                    difficulty: difficulty,
                    time: parseFloat(time)
                });
                highScores.sort((a, b) => a.time - b.time); // Keep sorted by time
                localStorage.setItem('mazeHighScores', JSON.stringify(highScores.slice(-10)));
                
                // Update display
                if (bestElements[difficulty]) {
                    bestElements[difficulty].textContent = `${time.toFixed(1)}s`;
                }
            }
        }

        // Update timer warning display
        function updateTimerWarning(elapsed, limit) {
            const remaining = limit - elapsed;
            
            if (remaining <= 0) {
                timerWarningEl.textContent = `⏰ Time's up!`;
                timerWarningEl.style.display = 'block';
            } else if (remaining <= 15) {
                timerWarningEl.textContent = `⚠️ ${remaining.toFixed(0)}s left!`;
                timerWarningEl.style.display = 'block';
            } else {
                timerWarningEl.style.display = 'none';
            }
        }

        // Maze generation using DFS
        function generateMaze(cols, rows) {
            const grid = [];
            for (let y = 0; y < rows; y++) {
                grid[y] = [];
                for (let x = 0; x < cols; x++) {
                    grid[y][x] = { 
                        visited: false, 
                        walls: { top: true, right: true, bottom: true, left: true } 
                    };
                }
            }

            const stack = [];
            let current = { x: 0, y: 0 };
            grid[0][0].visited = true;
            stack.push(current);

            while (stack.length > 0) {
                current = stack[stack.length - 1];
                const neighbors = getUnvisitedNeighbors(current, grid);

                if (neighbors.length > 0) {
                    const neighbor = neighbors[Math.floor(Math.random() * neighbors.length)];
                    removeWall(current, neighbor, grid);
                    grid[neighbor.y][neighbor.x].visited = true;
                    stack.push(neighbor);
                } else {
                    stack.pop();
                }
            }

            return grid;
        }

        function getUnvisitedNeighbors(cell, grid) {
            const neighbors = [];
            const { x, y } = cell;

            if (y > 0 && !grid[y - 1][x].visited) neighbors.push({ x, y: y - 1 });
            if (x < grid[0].length - 1 && !grid[y][x + 1].visited) neighbors.push({ x: x + 1, y });
            if (y < grid.length - 1 && !grid[y + 1][x].visited) neighbors.push({ x, y: y + 1 });
            if (x > 0 && !grid[y][x - 1].visited) neighbors.push({ x: x - 1, y });

            return neighbors;
        }

        function removeWall(cell1, cell2, grid) {
            const dx = cell1.x - cell2.x;
            const dy = cell1.y - cell2.y;

            if (dx === 1) {
                grid[cell1.y][cell1.x].walls.left = false;
                grid[cell2.y][cell2.x].walls.right = false;
            } else if (dx === -1) {
                grid[cell1.y][cell1.x].walls.right = false;
                grid[cell2.y][cell2.x].walls.left = false;
            } else if (dy === 1) {
                grid[cell1.y][cell1.x].walls.bottom = false;
                grid[cell2.y][cell2.x].walls.top = false;
            } else if (dy === -1) {
                grid[cell1.y][cell1.x].walls.top = false;
                grid[cell2.y][cell2.x].walls.bottom = false;
            }
        }

        function drawMaze() {
            const width = config.cols * cellSize;
            const height = config.rows * cellSize;

            // Set canvas size (this also clears it)
            canvas.width = width;
            canvas.height = height;

            // Explicitly clear canvas
            ctx.clearRect(0, 0, width, height);

            // Background
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, width, height);

            // Draw walls
            ctx.strokeStyle = '#6366f1';
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';

            for (let y = 0; y < config.rows; y++) {
                for (let x = 0; x < config.cols; x++) {
                    const cell = maze[y][x];
                    const px = x * cellSize;
                    const py = y * cellSize;

                    ctx.beginPath();
                    if (cell.walls.top) {
                        ctx.moveTo(px, py);
                        ctx.lineTo(px + cellSize, py);
                    }
                    if (cell.walls.right) {
                        ctx.moveTo(px + cellSize, py);
                        ctx.lineTo(px + cellSize, py + cellSize);
                    }
                    if (cell.walls.bottom) {
                        ctx.moveTo(px + cellSize, py + cellSize);
                        ctx.lineTo(px, py + cellSize);
                    }
                    if (cell.walls.left) {
                        ctx.moveTo(px, py + cellSize);
                        ctx.lineTo(px, py);
                    }
                    ctx.stroke();
                }
            }

            // Draw goal with pulsing animation
            const goalX = goal.x * cellSize + cellSize / 2;
            const goalY = goal.y * cellSize + cellSize / 2;
            
            // Pulsing effect (sin wave for smooth animate draw)
            const pulse = Math.sin(Date.now() / 200) * 5 + 8; // 3-13px radius oscillation
            const pulseAlpha = (Math.sin(Date.now() / 200) + 1) * 0.5; // 0-1 alpha for glow
            
            // Pulsering outer glow
            const pulseGradient = ctx.createRadialGradient(goalX, goalY, 0, goalX, goalY, cellSize / 2 + pulse);
            pulseGradient.addColorStop(0, `rgba(74, 222, 128, ${pulseAlpha * 0.6})`);
            pulseGradient.addColorStop(1, 'rgba(74, 222, 128, 0)');
            ctx.fillStyle = pulseGradient;
            ctx.beginPath();
            ctx.arc(goalX, goalY, cellSize / 2 + pulse, 0, Math.PI * 2);
            ctx.fill();

            // Solid goal zone (inner circle)
            ctx.fillStyle = '#4ade80';
            ctx.beginPath();
            ctx.arc(goalX, goalY, cellSize / 4 + pulse * 0.3, 0, Math.PI * 2);
            ctx.fill();

            // Debug mode: Show cell boundaries and grid
            if (debugMode) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.lineWidth = 0.5;
                
                // Draw cell grid
                for (let y = 0; y <= config.rows; y++) {
                    ctx.beginPath();
                    ctx.moveTo(0, y * cellSize);
                    ctx.lineTo(config.cols * cellSize, y * cellSize);
                    ctx.stroke();
                }
                
                for (let x = 0; x <= config.cols; x++) {
                    ctx.beginPath();
                    ctx.moveTo(x * cellSize, 0);
                    ctx.lineTo(x * cellSize, config.rows * cellSize);
                    ctx.stroke();
                }

                // Highlight current ball cell
                const currentCellX = Math.floor(ball.x);
                const currentCellY = Math.floor(ball.y);
                
                // Draw border around ball's current cell
                ctx.strokeStyle = 'rgba(255, 215, 0, 0.8)'; // Gold border
                ctx.lineWidth = 2;
                const ballPx = currentCellX * cellSize;
                const ballPy = currentCellY * cellSize;
                
                ctx.strokeRect(ballPx, ballPy, cellSize, cellSize);

                // Show cell coordinates
                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.font = '10px monospace';
                const ballCenterX = currentCellX * cellSize + cellSize / 2;
                const ballCenterY = currentCellY * cellSize + cellSize / 2;
                ctx.fillText(`Ball: ${currentCellX},${currentCellY}`, ballCenterX - 25, ballCenterY);
                
                // Show goal cell coordinates
                ctx.fillStyle = 'rgba(74, 222, 128, 0.8)';
                const goalCenterX = goal.x * cellSize + cellSize / 2;
                const goalCenterY = goal.y * cellSize + cellSize / 2;
                ctx.fillText(`Goal: ${goal.x},${goal.y}`, goalCenterX - 20, goalCenterY);
            }

            // Update ball position visually
            updateBallVisuals();
        }

        function updateBallVisuals() {
            const x = ball.x * cellSize + cellSize / 2;
            const y = ball.y * cellSize + cellSize / 2;

            ballEl.style.width = ballRadius * 2 + 'px';
            ballEl.style.height = ballRadius * 2 + 'px';
            ballEl.style.left = (ball.x * cellSize + cellSize / 2 - ballRadius) + 'px';
            ballEl.style.top = (ball.y * cellSize + cellSize / 2 - ballRadius) + 'px';
        }

        function getCellAt(x, y) {
            const cellX = Math.floor(x);
            const cellY = Math.floor(y);
            return maze[cellY]?.[cellX] || null;
        }

        function updatePhysics() {
            if (!isPlaying) return;

            // Get difficulty-based physics modifiers
            const diff = document.getElementById('difficulty').value;
            const mods = PHYSICS_MODIFIERS[diff] || PHYSICS_MODIFIERS.medium;
            
            // Apply difficulty-adjusted friction
            ball.vx *= SURFACE_FRICTION_BASE * mods.friction;
            ball.vy *= SURFACE_FRICTION_BASE * mods.friction;

            // Stop if very slow
            const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
            if (speed < VELOCITY_THRESHOLD) {
                ball.vx = 0;
                ball.vy = 0;
            }

            // Ball radius (fraction of cell size) - ball edge should touch walls
            const r = 0.3;

            // Clear debug info
            let debugMsg = "";

            // Update position step by step for proper collision detection
            // We'll move in small sub-steps to catch all wall collisions
            
            // Clamp bounds first (absolute limits)
            let maxX = config.cols - r;
            let maxY = config.rows - r;

            // Move X axis with collision detection
            if (Math.abs(ball.vx) > 0) {
                const oldX = ball.x;
                
                // Move ball in X direction
                ball.x += ball.vx;
                
                // Clamp to bounds
                ball.x = Math.max(r, Math.min(maxX, ball.x));
                
                // Check if we crossed a cell boundary (and hit a wall)
                const startCellX = Math.floor(oldX);
                const endCellX = Math.floor(ball.x);
                
                if (startCellX !== endCellX) {
                    // We crossed a vertical cell boundary - check walls!
                    const cellY = Math.floor(ball.y);
                    
                    if (ball.vx > 0) { // Moving right
                        // Check wall in the cell we're leaving (right wall of current cell)
                        const cell = maze[cellY]?.[startCellX];
                        if (cell && cell.walls.right) {
                            // Hit a wall! Bounce back with difficulty-adjusted bounce factor
                            ball.x = startCellX + 1 - r;
                            ball.vx *= -(BALL_BOUNCE_BASE * mods.bounce);
                            // Haptic feedback for mobile (wall collision)
                            if ('vibrate' in navigator && navigator.vibrate) {
                                navigator.vibrate(10); // Short vibration
                            }
                        } else {
                            // No wall, move freely into new cell
                            debugMsg = `→ Cell: ${startCellX}→${endCellX}`;
                        }
                    } else { // Moving left
                        // Check wall in the cell we're entering (left wall of destination)
                        const destCell = maze[cellY]?.[endCellX];
                        if (destCell && destCell.walls.left) {
                            // Hit a wall! Bounce back with difficulty-adjusted bounce factor
                            ball.x = endCellX + r;
                            ball.vx *= -(BALL_BOUNCE_BASE * mods.bounce);
                            // Haptic feedback for mobile (wall collision)
                            if ('vibrate' in navigator && navigator.vibrate) {
                                navigator.vibrate(10); // Short vibration
                            }
                        } else {
                            debugMsg = `← Cell: ${startCellX}→${endCellX}`;
                        }
                    }
                } else {
                    // Didn't cross cell boundary - just clamped to edge of current cell
                    const cell = maze[cellY]?.[startCellX];
                    if (cell) {
                        if (ball.vx > 0 && ball.x >= endCellX + 1 - r) {
                            // Pressing against right wall
                            ball.x = endCellX + 1 - r;
                        } else if (ball.vx < 0 && ball.x <= endCellX + r) {
                            // Pressing against left wall  
                            ball.x = endCellX + r;
                        }
                    }
                }
            }

            // Move Y axis with collision detection (independent from X)
            if (Math.abs(ball.vy) > 0) {
                const oldY = ball.y;
                
                // Move ball in Y direction
                ball.y += ball.vy;
                
                // Clamp to bounds (after X move)
                ball.y = Math.max(r, Math.min(maxY, ball.y));
                
                // Check if we crossed a cell boundary (and hit a wall)
                const startCellY = Math.floor(oldY);
                const endCellY = Math.floor(ball.y);
                
                if (startCellY !== endCellY) {
                    // We crossed a horizontal cell boundary - check walls!
                    const ballX = Math.floor(ball.x);
                    
                    if (ball.vy > 0) { // Moving down
                        // Check wall in the cell we're leaving (bottom wall of current cell)
                        const cell = maze[startCellY]?.[ballX];
                        if (cell && cell.walls.bottom) {
                            // Hit a wall! Bounce back with difficulty-adjusted bounce factor
                            ball.y = startCellY + 1 - r;
                            ball.vy *= -(BALL_BOUNCE_BASE * mods.bounce);
                            // Haptic feedback for mobile (wall collision)
                            if ('vibrate' in navigator && navigator.vibrate) {
                                navigator.vibrate(10); // Short vibration
                            }
                        } else {
                            debugMsg += ` | ↓ Cell: ${startCellY}→${endCellY}`;
                        }
                    } else { // Moving up
                        // Check wall in the cell we're entering (top wall of destination)
                        const destCell = maze[endCellY]?.[ballX];
                        if (destCell && destCell.walls.top) {
                            // Hit a wall! Bounce back with difficulty-adjusted bounce factor
                            ball.y = endCellY + r;
                            ball.vy *= -(BALL_BOUNCE_BASE * mods.bounce);
                            // Haptic feedback for mobile (wall collision)
                            if ('vibrate' in navigator && navigator.vibrate) {
                                navigator.vibrate(10); // Short vibration
                            }
                        } else {
                            debugMsg += ` | ↑ Cell: ${startCellY}→${endCellY}`;
                        }
                    }
                } else {
                    // Didn't cross cell boundary - just clamped to edge of current cell
                    const cell = maze[startCellY]?.[cellX];
                    if (cell) {
                        if (ball.vy > 0 && ball.y >= endCellY + 1 - r) {
                            // Pressing against bottom wall
                            ball.y = endCellY + 1 - r;
                        } else if (ball.vy < 0 && ball.y <= endCellY + r) {
                            // Pressing against top wall  
                            ball.y = endCellY + r;
                        }
                    }
                }
            }

            // Update visuals with new position
            updateBallVisuals();

            // Debug: log collision info if debug enabled
            const debugEl = document.getElementById('debug-info');
            if (debugEl && debugEl.style.display === 'block') {
                debugLog(`Pos: ${ball.x.toFixed(2)},${ball.y.toFixed(2)} | V: ${ball.vx.toFixed(3)},${ball.vy.toFixed(3)} ${debugMsg}`);
            }

            // Check goal - ball is in goal cell (center of ball aligns with cell)
            if (Math.floor(ball.x + 0.5) === goal.x && Math.floor(ball.y + 0.5) === goal.y) {
                gameWon();
            }
        }

        function gameWon() {
            if (!isPlaying) return;
            isPlaying = false;

            const time = ((Date.now() - startTime) / 1000).toFixed(2);
            
            // Haptic victory pattern (mobile only)
            if ('vibrate' in navigator && navigator.vibrate) {
                // Celebration pattern: long vibration, short pause, double tap
                navigator.vibrate([200, 50, 100, 50, 200]);
            }
            
            // Save high score (using our new function)
            const diff = document.getElementById('difficulty').value;
            saveHighScore(diff, time);
            
            // Show victory message
            alert(`🎉 Maze Complete!\n\nTime: ${time}s`);
        }

        function initGame() {
            const diff = document.getElementById('difficulty').value;
            config = CONFIG[diff];

            // Generate maze
            maze = generateMaze(config.cols, config.rows);

            // Set start and goal positions
            ball.x = 0.5;
            ball.y = 0.5;
            ball.vx = 0;
            ball.vy = 0;

            goal.x = config.cols - 1;
            goal.y = config.rows - 1;

            drawMaze();
        }

        function startGame() {
            initGame();
            isPlaying = true;
            startTime = Date.now();

            // Request device orientation permission (iOS 13+)
            if (typeof DeviceOrientationEvent !== 'undefined' && 
                typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permission => {
                        if (permission === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                        }
                    })
                    .catch(err => console.error('Permission denied:', err));
            } else {
                // Non-iOS or already permitted
                window.addEventListener('deviceorientation', handleOrientation);
            }

            gameLoop();
        }

        function handleOrientation(event) {
            if (!isPlaying) return;

            // Device orientation values
            // Beta: front/back tilt (-180 to 180, positive = tilted forward/top down)
            // Gamma: left/right tilt (-90 to 90, positive = tilted right)
            const beta = (event.beta || 0);
            const gamma = (event.gamma || 0);
            
            // Ball rolls in direction of tilt (like a real ball on a tilted surface)
            // Tilt phone forward (beta positive) -> ball rolls down (vy positive)
            // Tilt phone right (gamma positive) -> ball rolls right (vx positive)
            
            // Use direct angle values with higher sensitivity for better control
            ball.vx += Math.sin(gamma * 0.5) * GRAVITY_ACCEL;
            ball.vy += Math.sin(beta * 0.5) * GRAVITY_ACCEL;
            
            // Debug: log orientation values
            console.log(`Orientation: beta=${beta.toFixed(1)}, gamma=${gamma.toFixed(1)} | vel: ${ball.vx.toFixed(4)},${ball.vy.toFixed(4)}`);
        }

        // Keyboard controls for desktop
        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            ['arrowup', 'arrowdown', 'arrowleft', 'arrowright', 'w', 'a', 's', 'd'].includes(e.key.toLowerCase()) && e.preventDefault();
        });

        window.addEventListener('keyup', e => {
            keys[e.key.toLowerCase()] = false;
        });

        function handleKeyboard() {
            if (!isPlaying) return;

            // Use same acceleration as device tilt for consistency
            const accel = GRAVITY_ACCEL * 1.5; // Slightly stronger for keyboard

            if (keys['arrowup'] || keys['w']) ball.vy -= accel;
            if (keys['arrowdown'] || keys['s']) ball.vy += accel;
            if (keys['arrowleft'] || keys['a']) ball.vx -= accel;
            if (keys['arrowright'] || keys['d']) ball.vx += accel;

            // Cap velocity
            ball.vx = Math.max(-MAX_VELOCITY, Math.min(MAX_VELOCITY, ball.vx));
            ball.vy = Math.max(-MAX_VELOCITY, Math.min(MAX_VELOCITY, ball.vy));
        }

        function gameLoop() {
            handleKeyboard();
            updatePhysics();

            // Update timer and warnings
            if (isPlaying) {
                const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                timeEl.textContent = elapsed + 's';
                
                // Check timer warning based on difficulty
                const diff = document.getElementById('difficulty').value;
                const limit = TIME_LIMITS[diff];
                
                if (limit) {
                    updateTimerWarning(parseFloat(elapsed), limit);
                }
            }

            requestAnimationFrame(gameLoop);
        }

        // Event Listeners
        document.getElementById('start-btn').addEventListener('click', () => {
            overlay.classList.add('hidden');
            startGame();
        });

        function debugLog(msg) {
            const debugEl = document.getElementById('debug-info');
            if (debugEl) {
                debugEl.style.display = 'block';
                debugEl.textContent = msg;
            }
        }

        document.getElementById('new-maze-btn').addEventListener('click', () => {
            const oldRows = maze.length;
            debugLog(`New maze clicked! Old: ${oldRows} rows`);
            isPlaying = true;
            ball.vx = 0;
            ball.vy = 0;
            ball.x = 0.5;
            ball.y = 0.5;
            startTime = Date.now();
            initGame();
            debugLog(`Maze: ${oldRows} → ${maze.length} rows (${config.cols}x${config.rows})`);

            // Flash effect to show something happened
            const container = document.getElementById('game-container');
            container.style.boxShadow = '0 0 80px rgba(74, 222, 128, 0.8)';
            setTimeout(() => {
                container.style.boxShadow = '0 0 40px rgba(99, 102, 241, 0.3)';
            }, 300);
        });

        document.getElementById('difficulty').addEventListener('change', () => {
            isPlaying = true;
            startTime = Date.now();
            initGame();
        });

        // Debug mode state
        let debugMode = false;
        const debugCheckbox = document.getElementById('toggle-debug');
        if (debugCheckbox) {
            debugCheckbox.addEventListener('change', () => {
                debugMode = debugCheckbox.checked;
                const debugEl = document.getElementById('debug-info');
                if (debugEl) {
                    debugEl.style.display = debugMode ? 'block' : 'none';
                }
            });
        }

        // Initial setup
        config = CONFIG.medium;
        maze = generateMaze(config.cols, config.rows);
        
        // Load and display high scores
        loadHighScores();
    </script>
</body>
</html>
